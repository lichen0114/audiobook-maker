name: Release desktop app

# Build the self-contained macOS app and attach the .dmg to a GitHub Release
# whenever a v* tag is pushed (e.g. `git tag v0.1.0 && git push --tags`).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {} # allow manual runs from the Actions tab

permissions:
  contents: write # needed to create the Release and upload assets

jobs:
  package:
    runs-on: macos-14 # Apple Silicon runner (arm64)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install the Native SDK CLI
        run: npm install -g @native-sdk/cli@0.4.0

      - name: Install espeak-ng (bundled, relocated by the packager)
        run: brew install espeak-ng

      - name: Build AudiobookMaker.app + .dmg
        run: ./desktop/packaging/package.sh
        env:
          VERSION: ${{ github.ref_name }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AudiobookMaker-dmg
          path: desktop/dist/AudiobookMaker.dmg

      - name: Attach to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/dist/AudiobookMaker.dmg
          body: |
            ## Audiobook Maker ${{ github.ref_name }} (macOS, Apple Silicon)

            Download **AudiobookMaker.dmg**, open it, and drag the app to Applications.

            Unsigned build — on first open, **right-click the app → Open** (or run
            `xattr -dr com.apple.quarantine "/Applications/AudiobookMaker.app"`).
            The first conversion downloads the ~330 MB voice model.
